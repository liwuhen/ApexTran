# ApexTran reverse proxy.
#
# Assumptions:
# - Next.js frontend listens on 127.0.0.1:3000.
# - ApexTran WebChannel backend listens on 127.0.0.1:8000.
# - Browser traffic enters through this Nginx server.
#
# Install example:
#   sudo cp deploy/nginx/apextran.conf /etc/nginx/conf.d/apextran.conf
#   sudo nginx -t
#   sudo systemctl reload nginx

upstream apextran_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream apextran_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    # Match local smoke tests explicitly. Replace/add your real domain in
    # production, e.g. `server_name apextran.example.com;`.
    server_name 127.0.0.1 localhost;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # LangGraph-compatible runtime API. The frontend calls /api/langgraph/*,
    # while the ApexTran WebChannel serves those endpoints at backend root
    # (/threads, /assistants, ...), so this location strips /api/langgraph/.
    location = /api/langgraph {
        proxy_pass http://apextran_backend/;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/langgraph/ {
        proxy_pass http://apextran_backend/;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no always;
    }

    # Gateway resource API. Keep the /api prefix because the backend routes are
    # /api/models and /api/skills.
    location ~ ^/api/(models|skills)(/.*)?$ {
        proxy_pass http://apextran_backend;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Next.js dev HMR websocket. It is harmless if unused in production.
    location /_next/webpack-hmr {
        proxy_pass http://apextran_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Next.js dev/prod server. /api/auth and other frontend-local API routes
    # intentionally fall through here unless matched above.
    location / {
        proxy_pass http://apextran_frontend;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
